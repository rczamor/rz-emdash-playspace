services:
  postgres:
    image: postgres:16-alpine
    network_mode: host
    environment:
      POSTGRES_USER: emdash
      POSTGRES_PASSWORD: emdash
      POSTGRES_DB: emdash
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emdash -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
